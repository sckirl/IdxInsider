version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: openinsider-db
    environment:
      POSTGRES_DB: openinsider
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: openinsider-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@db:5432/openinsider}
      ALLOWED_ORIGINS: "http://${SERVER_IP:-localhost}:${FRONTEND_PORT:-6969},http://localhost:6969"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: openinsider-frontend
    ports:
      - "${FRONTEND_PORT:-6969}:6969"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=${API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend

volumes:
  postgres_data:
