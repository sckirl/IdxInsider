version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: openinsider-db
    environment:
      POSTGRES_DB: openinsider
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: openinsider-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/openinsider
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: openinsider-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
